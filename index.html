<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split Layout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 30%;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      padding: 40px;
    }

    .right {
      width: 70%;
      margin-left: 30%;
      height: 100vh;
      overflow-y: scroll;
      padding: 40px;
    }

    .right-content {
      height: 2000px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="left">
      <h2>Fixed Panel</h2>
      <p>This panel stays fixed while you scroll the right side.</p>
    </div>

    <div class="right">
      <div class="right-content">
        <h2>Scrollable Panel</h2>
        <p>Scroll down to test. This content area is 2000px tall.</p>
      </div>
    </div>

  </div>

</body>
</html>
